# MICRO-SERVICIO
spring.application.name=ICEOPS-ANALYTICS-SERVICE
server.port=8086

# MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/iceops_analytics?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# EUREKA
eureka.client.service-url.defaultZone=http://quantik-eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# RABBITMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RESILIENCE4J CIRCUIT BREAKER (si aplica)
resilience4j.circuitbreaker.instances.analyticsServiceBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.analyticsServiceBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.analyticsServiceBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.analyticsServiceBreaker.waitDurationInOpenState=10s

# ACTUATOR / OBSERVABILITY
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always