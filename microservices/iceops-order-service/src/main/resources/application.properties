spring.application.name=ICEOPS-ORDER-SERVICE
server.port=8085

# MYSQL
spring.datasource.url=jdbc:mysql://localhost:3306/iceops_orders?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# EUREKA
eureka.client.service-url.defaultZone=http://quantik-eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# RABBITMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# RESILIENCE4J CIRCUIT BREAKER
resilience4j.circuitbreaker.instances.userServiceBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.userServiceBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.userServiceBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.userServiceBreaker.waitDurationInOpenState=10s

# ACTUATOR (OBSERVABILITY)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always