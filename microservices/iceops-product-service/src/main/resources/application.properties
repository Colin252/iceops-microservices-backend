spring.application.name=ICEOPS-PRODUCT-SERVICE
server.port=8084

# MYSQL
spring.datasource.url=jdbc:mysql://host.docker.internal:3306/iceops_products?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# EUREKA
eureka.client.service-url.defaultZone=http://quantik-eureka-server:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true